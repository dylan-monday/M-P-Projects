<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Your Project</title>
</head>
<body style="margin: 0; padding: 0; background-color: #041c45; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #041c45;">
    <tr>
      <td align="center" style="padding: 60px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 48px;">
              <img src="https://projects.mondayandpartners.com/brand/MP26-white.png" alt="Monday + Partners" width="140" height="29" style="display: block;">
            </td>
          </tr>

          <!-- Main Content Card -->
          <tr>
            <td style="background-color: #020f24; border: 1px solid rgba(212, 168, 67, 0.15); padding: 48px 40px;">

              <!-- Heading -->
              <h1 style="margin: 0 0 16px 0; font-size: 26px; font-weight: 300; color: #ffffff; letter-spacing: -0.01em; text-align: center;">
                Access Your Project
              </h1>

              <!-- Subtext -->
              <p style="margin: 0 0 36px 0; font-size: 15px; line-height: 1.7; color: rgba(255, 255, 255, 0.5); font-weight: 300; text-align: center;">
                Click below to securely access your project portal.<br>
                This link expires in 24 hours.
              </p>

              <!-- Button -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; padding: 18px 48px; background-color: #d4a843; color: #041c45; font-size: 14px; font-weight: 600; text-decoration: none; letter-spacing: 0.03em; border-radius: 50px;">
                      Open Project Portal
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Security Note -->
              <p style="margin: 40px 0 0 0; font-size: 12px; line-height: 1.6; color: rgba(255, 255, 255, 0.25); text-align: center;">
                If you didn't request this link, you can safely ignore this email.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top: 40px;">
              <p style="margin: 0 0 6px 0; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255, 255, 255, 0.4);">
                Monday + Partners
              </p>
              <p style="margin: 0; font-size: 11px; color: rgba(255, 255, 255, 0.25); font-style: italic;">
                Clarity - Conjuring - Currency
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
