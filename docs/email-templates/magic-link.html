<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Your Project</title>
</head>
<body style="margin: 0; padding: 0; background-color: #010812; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #010812;">
    <tr>
      <td align="center" style="padding: 60px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 48px;">
              <img src="https://projects.mondayandpartners.com/brand/MP26.svg" alt="Monday + Partners" width="56" height="56" style="display: block; filter: brightness(0) invert(1);">
            </td>
          </tr>

          <!-- Main Content -->
          <tr>
            <td style="background: linear-gradient(180deg, rgba(212, 168, 67, 0.03) 0%, transparent 100%); border: 1px solid rgba(255, 255, 255, 0.06); padding: 48px 40px; border-radius: 2px;">

              <!-- Heading -->
              <h1 style="margin: 0 0 16px 0; font-size: 24px; font-weight: 300; color: rgba(255, 255, 255, 0.9); letter-spacing: -0.01em; text-align: center;">
                Access Your Project
              </h1>

              <!-- Subtext -->
              <p style="margin: 0 0 36px 0; font-size: 15px; line-height: 1.6; color: rgba(255, 255, 255, 0.45); font-weight: 300; text-align: center;">
                Click below to securely access your project portal.<br>
                This link expires in 24 hours.
              </p>

              <!-- Button -->
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; padding: 16px 40px; background: linear-gradient(135deg, #fac64f 0%, #d4a843 100%); color: #041c45; font-size: 14px; font-weight: 500; text-decoration: none; letter-spacing: 0.02em; border-radius: 2px;">
                      Open Project Portal
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Security Note -->
              <p style="margin: 36px 0 0 0; font-size: 12px; line-height: 1.6; color: rgba(255, 255, 255, 0.25); text-align: center;">
                If you didn't request this link, you can safely ignore this email.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top: 48px;">
              <p style="margin: 0 0 8px 0; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255, 255, 255, 0.3);">
                Monday + Partners
              </p>
              <p style="margin: 0; font-size: 11px; color: rgba(255, 255, 255, 0.2); font-style: italic;">
                Clarity. Conjunction. Currency.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
